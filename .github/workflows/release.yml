name: Release

# Matrix-build PivBO installers on every v* tag push and attach them to
# the matching GitHub Release. First run will surface platform-specific
# gotchas — expect to iterate on this workflow a few times.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          python -m pip install briefcase

      - name: Briefcase create
        run: briefcase create

      - name: Briefcase build
        run: briefcase build

      - name: Briefcase package
        run: briefcase package --adhoc-sign

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pivbo-${{ matrix.os }}
          path: |
            dist/**
            linux/**/dist/**
            macOS/**/dist/**
            windows/**/dist/**
          if-no-files-found: warn

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**
            linux/**/dist/**
            macOS/**/dist/**
            windows/**/dist/**
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
